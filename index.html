<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Practice 1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css";; rel="stylesheet">
</head>
<body>
    <h1>JavaScript Conditional Statements</h1>

    <br><br>

    <input type="text" id="Age" class="form-control" placeholder="type here...">
    <br>
    <button class="btn btn-info" onclick="checkAge()">Check Age</button>
    
    <script>
        //checkAge
        function checkAge(){

            var age = document.getElementById("Age").value;

        if(isNaN(age)|| age < 0 ){
            alert("Please enter a valid age.");
      }

       else if(age < 18){
            alert("You are underage.");
        }  
        else if(age > 18){
            alert("Your are of legal age.");
        }
        else {
            alert("Your age could not be classified.");
        }
    }
     </script>

     <!--change the age to show the else/else if-->
</body>
</html>
